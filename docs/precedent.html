    <style>
        :root {
            --midnight: #0F172A; --midnight-up: #131c33; --midnight-up2: #172035;
            --slate: #334155; --steel: #94A3B8; --snow: #F8FAFC; --white: #FFFFFF;
            --accent: #2563EB; --accent-light: #3B82F6; --accent-dark: #1D4ED8;
            --accent-ghost: rgba(37,99,235,0.08);
            --border: #1E293B;
            --font-ui: 'Noto Sans KR', -apple-system, sans-serif;
            --font-code: 'JetBrains Mono', 'Fira Code', monospace;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-ui); background: var(--midnight); color: var(--snow); line-height: 1.7; }
        a { color: inherit; text-decoration: none; }

        /* Nav */
        nav { padding: 16px 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(15,23,42,0.95); backdrop-filter: blur(12px); z-index: 100; }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; color: var(--snow); }
        .nav-brand span { color: var(--accent-light); }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { font-size: 14px; color: var(--steel); transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--snow); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        .page-header { padding: 48px 0 32px; }
        .page-header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
        .page-header p { font-size: 15px; color: var(--steel); }

        /* Search */
        .search-bar { position: sticky; top: 57px; z-index: 90; background: rgba(15,23,42,0.95); backdrop-filter: blur(12px); padding: 16px 0; border-bottom: 1px solid var(--border); }
        .search-form { display: flex; gap: 12px; flex-wrap: wrap; }
        .search-input-wrap { flex: 1; min-width: 280px; position: relative; }
        .search-input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--slate); pointer-events: none; }
        .search-input { width: 100%; padding: 12px 16px 12px 42px; background: var(--midnight-up); border: 1px solid var(--border); border-radius: 8px; color: var(--snow); font-family: var(--font-ui); font-size: 15px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--slate); }
        .search-btn { padding: 12px 24px; background: var(--accent); border: none; border-radius: 8px; color: var(--white); font-family: var(--font-ui); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
        .search-btn:hover { background: var(--accent-light); }
        .search-btn:disabled { opacity: 0.5; cursor: default; }

        .filter-row { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
        .filter-select { padding: 10px 36px 10px 14px; background: var(--midnight-up); border: 1px solid var(--border); border-radius: 8px; color: var(--snow); font-family: var(--font-ui); font-size: 14px; outline: none; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2394A3B8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; transition: border-color 0.2s; }
        .filter-select:focus { border-color: var(--accent); }
        .filter-select option { background: var(--midnight-up); color: var(--snow); }

        /* Results info */
        .results-info { padding: 16px 0 8px; font-size: 13px; color: var(--slate); font-family: var(--font-code); }
        .results-info strong { color: var(--accent-light); }

        /* Precedent list */
        .prec-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }
        .prec-card { display: block; padding: 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--midnight-up); transition: border-color 0.2s; }
        .prec-card:hover { border-color: var(--accent); }
        .prec-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .prec-badge { font-family: var(--font-code); font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
        .prec-badge.court { background: rgba(37,99,235,0.12); color: #60A5FA; }
        .prec-badge.type { background: rgba(139,92,246,0.12); color: #A78BFA; }
        .prec-badge.result-type { background: rgba(34,197,94,0.12); color: #4ADE80; }
        .prec-case-num { font-family: var(--font-code); font-size: 12px; color: var(--steel); }
        .prec-date { font-family: var(--font-code); font-size: 12px; color: var(--slate); margin-left: auto; }
        .prec-title { font-size: 15px; font-weight: 500; line-height: 1.6; color: var(--snow); }

        /* Initial state */
        .state-box { text-align: center; padding: 80px 24px; }
        .state-box .icon { font-size: 48px; margin-bottom: 16px; }
        .state-box p { color: var(--steel); font-size: 15px; }
        .state-box .hint { color: var(--slate); font-size: 13px; margin-top: 12px; }
        .example-queries { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
        .example-btn { padding: 8px 16px; background: var(--midnight-up); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--steel); cursor: pointer; transition: all 0.15s; font-family: var(--font-ui); }
        .example-btn:hover { border-color: var(--accent); color: var(--snow); background: var(--accent-ghost); }
        .example-btn.highlight { border-color: var(--accent); color: var(--accent-light); background: var(--accent-ghost); }

        /* Loading */
        .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 8px; padding: 24px 0 80px; flex-wrap: wrap; }
        .page-btn { padding: 8px 14px; background: var(--midnight-up); border: 1px solid var(--border); border-radius: 6px; color: var(--steel); font-size: 13px; font-family: var(--font-code); cursor: pointer; transition: all 0.15s; }
        .page-btn:hover { border-color: var(--accent); color: var(--snow); }
        .page-btn.active { background: var(--accent); border-color: var(--accent); color: var(--white); }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        /* Error */
        .error-box { padding: 16px 20px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; color: #F87171; font-size: 14px; margin: 16px 0; }

        /* Precedent card v2 (with AI summary) */
        .prec-card-main { display: block; cursor: pointer; }
        .prec-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
        .summary-btn { background: linear-gradient(135deg, var(--accent-light), var(--accent)); color: #fff; border: 0; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; }
        .summary-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        .summary-btn:disabled { opacity: 0.6; cursor: default; }
        .external-link { font-size: 12px; color: var(--steel); margin-left: auto; }
        .external-link:hover { color: var(--accent-light); }
        .bookmark-btn { background: transparent; border: 1px solid var(--border); color: var(--steel); font-size: 14px; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s; line-height: 1; }
        .bookmark-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--snow); }
        .bookmark-btn:disabled { opacity: 0.5; cursor: wait; }
        .summary-area { margin-top: 12px; padding: 16px; background: rgba(37,99,235,0.04); border: 1px solid var(--accent-ghost); border-radius: 8px; font-size: 13px; line-height: 1.8; color: var(--snow); }
        .summary-area h3 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; color: var(--accent-light); }
        .summary-area h3:first-child { margin-top: 0; }
        .summary-area p { margin: 4px 0; color: #CBD5E1; }
        .summary-area ul, .summary-area ol { padding-left: 18px; margin: 4px 0; }
        .summary-area li { color: #CBD5E1; margin: 2px 0; }
        .summary-area strong { color: var(--snow); }
        .summary-area .cursor { display: inline-block; color: var(--accent-light); animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .summary-error { color: #F87171; font-size: 12px; margin-top: 8px; }
        .summary-meta { font-size: 11px; color: var(--slate); margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }

        /* Footer */
        footer { border-top: 1px solid var(--border); padding: 32px 0; }
        .footer-content { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--slate); }
        .footer-content a { color: var(--steel); text-decoration: none; }
        .footer-content a:hover { color: var(--snow); }
        .footer-links { display: flex; gap: 16px; }
    </style>

</head>

<script>
const OC = 'wjdgml89';
const API_BASE = 'https://www.law.go.kr/DRF/lawSearch.do';
const PER_PAGE = 20;
let currentPage = 1;
let currentQuery = '';
let totalCount = 0;

const form = document.getElementById('search-form');
const input = document.getElementById('search');
const btn = document.getElementById('search-btn');
const contentEl = document.getElementById('content');
const listEl = document.getElementById('prec-list');
const pagEl = document.getElementById('pagination');
const infoEl = document.getElementById('results-info');

// Example buttons
document.querySelectorAll('.example-btn').forEach(el => {
    el.addEventListener('click', () => {
        input.value = el.dataset.q;
        doSearch(1);
    });
});

form.addEventListener('submit', (e) => {
    e.preventDefault();
    doSearch(1);
});

// URL param support
const urlQ = new URLSearchParams(window.location.search).get('q');
if (urlQ) {
    input.value = urlQ;
    doSearch(1);
}

async function doSearch(page) {
    const query = input.value.trim();
    if (!query) return;

    currentQuery = query;
    currentPage = page;

    const url = new URL(window.location);
    url.searchParams.set('q', query);
    history.replaceState(null, '', url);

    btn.disabled = true;
    contentEl.innerHTML = '<div class="state-box"><div class="loading-spinner"></div><p>판례를 검색하는 중...</p></div>';
    contentEl.style.display = 'block';
    listEl.style.display = 'none';
    pagEl.innerHTML = '';
    infoEl.innerHTML = '';

    try {
        const court = document.getElementById('filter-court').value;
        const sort = document.getElementById('filter-sort').value;

        const params = new URLSearchParams({
            OC: OC,
            target: 'prec',
            type: 'JSON',
            query: query,
            display: PER_PAGE,
            page: page,
            sort: sort
        });
        if (court) params.set('court', court);

        const res = await fetch(`${API_BASE}?${params}`);
        const data = await res.json();
        renderResults(data);
    } catch (err) {
        contentEl.innerHTML = '<div class="error-box">판례를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>';
    } finally {
        btn.disabled = false;
    }
}

function renderResults(data) {
    const precSearch = data.PrecSearch;
    if (!precSearch || precSearch.totalCnt === '0') {
        contentEl.innerHTML = '<div class="state-box"><p>검색 결과가 없습니다.</p></div>';
        infoEl.innerHTML = '';
        return;
    }

    totalCount = parseInt(precSearch.totalCnt) || 0;
    let items = precSearch.prec || [];
    if (!Array.isArray(items)) items = [items];

    if (items.length === 0) {
        contentEl.innerHTML = '<div class="state-box"><p>검색 결과가 없습니다.</p></div>';
        return;
    }

    infoEl.innerHTML = `"${currentQuery}" 검색 결과 <strong>${totalCount.toLocaleString()}</strong>건`;

    listEl.innerHTML = items.map(p => {
        const caseNum = p.사건번호 || '';
        const caseName = p.사건명 || '';
        const courtName = p.법원명 || '';
        const caseType = p.사건종류명 || '';
        const judgeDate = p.선고일자 || '';
        const serial = p.판례일련번호 || '';
        const resultType = p.판결유형 || '';
        const detailUrl = p.판례상세링크 ? `https://www.law.go.kr${p.판례상세링크}` : `https://www.law.go.kr/LSW/precInfoP.do?precSeq=${serial}`;

        return `<div class="prec-card" data-seq="${serial}">
            <a href="${detailUrl}" target="_blank" rel="noopener" class="prec-card-main">
                <div class="prec-top">
                    ${courtName ? `<span class="prec-badge court">${courtName}</span>` : ''}
                    ${caseType ? `<span class="prec-badge type">${caseType}</span>` : ''}
                    ${resultType ? `<span class="prec-badge result-type">${resultType}</span>` : ''}
                    <span class="prec-case-num">${caseNum}</span>
                    ${judgeDate ? `<span class="prec-date">${judgeDate}</span>` : ''}
                </div>
                <div class="prec-title">${caseName || caseNum}</div>
            </a>
            <div class="prec-actions">
                <button type="button" class="summary-btn" data-seq="${serial}">✨ AI 요약</button>
                <button type="button" class="bookmark-btn" data-seq="${serial}" data-title="${(caseName || caseNum).replace(/"/g, '&quot;')}" data-payload='${JSON.stringify({caseNum, courtName, caseType, judgeDate, resultType, detailUrl}).replace(/'/g, "&apos;")}' title="즐겨찾기">🔖</button>
                <a href="${detailUrl}" target="_blank" rel="noopener" class="external-link">원문 보기 →</a>
            </div>
            <div class="summary-area" data-seq="${serial}" style="display:none;"></div>
        </div>`;
    }).join('');

    // AI 요약 버튼 핸들러 바인딩
    listEl.querySelectorAll('.summary-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const seq = btn.dataset.seq;
            const card = btn.closest('.prec-card');
            const area = card.querySelector('.summary-area');
            if (area.dataset.loaded === '1') {
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
                return;
            }
            if (btn.disabled) return;
            summarizeCase(seq, btn, area);
        });
    });

    // 북마크 버튼 바인딩
    listEl.querySelectorAll('.bookmark-btn').forEach(btn => {
        const seq = btn.dataset.seq;
        // 초기 상태 확인
        if (window.LawkoBookmarks) {
            window.LawkoBookmarks.isBookmarked('precedent', seq).then(yes => {
                if (yes) { btn.textContent = '✅'; btn.title = '즐겨찾기 해제'; btn.style.color = 'var(--accent-light)'; }
            });
        }
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const user = window.LawkoAuth && window.LawkoAuth.getUser();
            if (!user) { window.LawkoAuth && window.LawkoAuth.openLogin(); return; }
            btn.disabled = true;
            try {
                const title = btn.dataset.title;
                let payload = {};
                try { payload = JSON.parse(btn.dataset.payload.replace(/&apos;/g, "'")); } catch {}
                const now = await window.LawkoBookmarks.toggle('precedent', seq, title, payload);
                btn.textContent = now ? '✅' : '🔖';
                btn.title = now ? '즐겨찾기 해제' : '즐겨찾기';
                btn.style.color = now ? 'var(--accent-light)' : '';
            } catch (err) {
                if (String(err.message || err) !== 'LOGIN_REQUIRED') {
                    alert('저장 실패: ' + (err.message || err));
                }
            } finally {
                btn.disabled = false;
            }
        });
    });

    contentEl.style.display = 'none';
    listEl.style.display = 'flex';
    renderPagination();
}

// ------- AI 판례 요약 -------
const SUMMARIZE_URL = `${window.LAWKO_CONFIG.supabaseUrl}/functions/v1/law-summarize`;

async function summarizeCase(precSeq, btn, area) {
    // 로그인 체크
    const user = window.LawkoAuth && window.LawkoAuth.getUser();
    if (!user) {
        window.LawkoAuth && window.LawkoAuth.openLogin();
        return;
    }
    const cfg = window.LAWKO_CONFIG;
    const supa = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    const { data: { session } } = await supa.auth.getSession();
    if (!session) {
        window.LawkoAuth && window.LawkoAuth.openLogin();
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '⏳ 요약 중...';
    area.style.display = 'block';
    area.innerHTML = '<span class="cursor">▋</span>';

    try {
        const res = await fetch(SUMMARIZE_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ precSeq }),
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: '오류' }));
            area.innerHTML = `<div class="summary-error">${escapeHtml(err.error || '요약에 실패했습니다.')}</div>`;
            if (err.code === 'QUOTA_EXCEEDED') {
                setTimeout(() => {
                    if (confirm('한도를 모두 사용했습니다. 광고제거 구독으로 하루 50회까지 이용하시겠어요?')) {
                        window.LawkoAuth && window.LawkoAuth.openSubscribe();
                    }
                }, 100);
            }
            btn.disabled = false;
            btn.innerHTML = '✨ AI 요약';
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let assembled = '';
        let meta = null;

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop() ?? '';
            for (const line of lines) {
                if (!line.startsWith('data:')) continue;
                const data = line.slice(5).trim();
                if (!data) continue;
                try {
                    const evt = JSON.parse(data);
                    if (evt.type === 'meta') {
                        meta = evt;
                    } else if (evt.type === 'delta') {
                        assembled += evt.text;
                        area.innerHTML = renderMarkdown(assembled) + '<span class="cursor">▋</span>';
                    } else if (evt.type === 'error') {
                        area.innerHTML += `<div class="summary-error">${escapeHtml(evt.message)}</div>`;
                    }
                } catch { /* 무시 */ }
            }
        }

        // 완료
        let html = renderMarkdown(assembled);
        if (meta && typeof meta.remaining === 'number') {
            const modelLabel = meta.modelTier === 'pro' ? ' · ✨ 고품질 AI(Sonnet)'
                             : meta.modelTier === 'free' ? ' · ⚡ 빠른 AI(Haiku)' : '';
            const upgradeLink = !meta.isPro
                ? ' · <a href="#" onclick="window.LawkoAuth&&window.LawkoAuth.openSubscribe();return false;" style="color:var(--accent-light);">Pro 업그레이드</a>'
                : '';
            html += `<div class="summary-meta">오늘 남은 요약/상담: ${meta.remaining}/${meta.limit}회${meta.isPro ? ' · Pro' : ''}${modelLabel}${upgradeLink}</div>`;
        }
        area.innerHTML = html;
        area.dataset.loaded = '1';
        btn.innerHTML = '✨ 접기 / 펼치기';
        btn.disabled = false;
    } catch (e) {
        area.innerHTML = `<div class="summary-error">네트워크 오류: ${escapeHtml(String(e.message || e))}</div>`;
        btn.disabled = false;
        btn.innerHTML = '✨ AI 요약 다시 시도';
    }
}

// 초경량 마크다운 렌더 (h3, 단락, 강조, 목록)
function renderMarkdown(src) {
    const esc = (s) => s.replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    const lines = src.split('\n');
    let html = '';
    let inList = false;
    for (const raw of lines) {
        const line = raw.trimEnd();
        if (/^##\s+/.test(line)) {
            if (inList) { html += '</ul>'; inList = false; }
            html += `<h3>${applyInline(esc(line.replace(/^##\s+/, '')))}</h3>`;
        } else if (/^-\s+/.test(line)) {
            if (!inList) { html += '<ul>'; inList = true; }
            html += `<li>${applyInline(esc(line.replace(/^-\s+/, '')))}</li>`;
        } else if (line.trim() === '') {
            if (inList) { html += '</ul>'; inList = false; }
        } else {
            if (inList) { html += '</ul>'; inList = false; }
            html += `<p>${applyInline(esc(line))}</p>`;
        }
    }
    if (inList) html += '</ul>';
    return html;
}
function applyInline(s) {
    return s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}
function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
}

function renderPagination() {
    const totalPages = Math.ceil(totalCount / PER_PAGE);
    if (totalPages <= 1) { pagEl.innerHTML = ''; return; }

    const maxPages = Math.min(totalPages, 20);
    let buttons = [];
    const maxVisible = 7;

    buttons.push(`<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">&larr;</button>`);

    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(maxPages, startPage + maxVisible - 1);
    if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

    if (startPage > 1) {
        buttons.push(`<button class="page-btn" data-page="1">1</button>`);
        if (startPage > 2) buttons.push(`<span class="page-btn" style="border:none;cursor:default">...</span>`);
    }
    for (let i = startPage; i <= endPage; i++) {
        buttons.push(`<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`);
    }
    if (endPage < maxPages) {
        if (endPage < maxPages - 1) buttons.push(`<span class="page-btn" style="border:none;cursor:default">...</span>`);
        buttons.push(`<button class="page-btn" data-page="${maxPages}">${maxPages}</button>`);
    }

    buttons.push(`<button class="page-btn" ${currentPage === maxPages ? 'disabled' : ''} data-page="${currentPage + 1}">&rarr;</button>`);

    pagEl.innerHTML = buttons.join('');
    pagEl.querySelectorAll('button[data-page]').forEach(b => {
        b.addEventListener('click', () => {
            const p = parseInt(b.dataset.page);
            if (p >= 1 && p <= maxPages) {
                doSearch(p);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    });
}
