<!-- marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>

<script>
const REPO_RAW = 'https://raw.githubusercontent.com/9bow/legalize-kr/main/';
const REPO_URL = 'https://github.com/9bow/legalize-kr';

const params = new URLSearchParams(window.location.search);
const path = params.get('path');

if (!path) {
    showError('법령 경로가 지정되지 않았습니다.', '법령 검색 페이지에서 법령을 선택해주세요.');
} else {
    loadLaw(path);
}

async function loadLaw(filePath) {
    try {
        // Fetch metadata and markdown in parallel
        const [metaRes, mdRes] = await Promise.all([
            fetch('metadata.json'),
            fetch(REPO_RAW + encodeURI(filePath))
        ]);

        if (!mdRes.ok) throw new Error('법령 파일을 찾을 수 없습니다.');

        const metadata = await metaRes.json();
        const mdText = await mdRes.text();

        // Find this law in metadata
        const lawMeta = Object.values(metadata).find(m => m.path === filePath);

        // Parse frontmatter
        const { frontmatter, body } = parseFrontmatter(mdText);

        // Update page title
        const title = frontmatter['제목'] || lawMeta?.제목 || filePath;
        document.title = `${title} — LAWKO`;

        // Render header
        renderHeader(frontmatter, lawMeta, filePath);

        // Find related laws (same directory)
        renderRelated(filePath, metadata);

        // Render markdown
        renderBody(body);

        // Build TOC
        buildTOC();

    } catch (err) {
        showError('법령을 불러오지 못했습니다.', err.message);
    }
}

function parseFrontmatter(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (!match) return { frontmatter: {}, body: text };

    const fm = {};
    let currentKey = null;
    let isList = false;

    match[1].split('\n').forEach(line => {
        const kvMatch = line.match(/^(\S.*?):\s*(.*)$/);
        if (kvMatch) {
            currentKey = kvMatch[1];
            const val = kvMatch[2].trim();
            if (val === '') {
                fm[currentKey] = [];
                isList = true;
            } else {
                fm[currentKey] = val.replace(/^'(.*)'$/, '$1').replace(/^"(.*)"$/, '$1');
                isList = false;
            }
        } else if (currentKey && line.match(/^- /)) {
            if (!Array.isArray(fm[currentKey])) fm[currentKey] = [];
            fm[currentKey].push(line.replace(/^- /, '').trim());
        }
    });

    return { frontmatter: fm, body: match[2] };
}

function getBadgeClass(type) {
    if (type === '법률' || type === '헌법') return type === '헌법' ? '헌법' : '법률';
    if (type === '대통령령' || type === '대통령긴급명령') return '대통령령';
    if (type?.endsWith('규칙')) return '규칙';
    return '부령';
}

function renderHeader(fm, meta, filePath) {
    const header = document.getElementById('law-header');
    const title = fm['제목'] || meta?.제목 || '';
    const type = fm['법령구분'] || meta?.법령구분 || '';
    const status = fm['상태'] || meta?.상태 || '';
    const dept = Array.isArray(fm['소관부처']) ? fm['소관부처'].join(', ') : (fm['소관부처'] || '');
    const promDate = fm['공포일자'] || '';
    const effDate = fm['시행일자'] || '';
    const promNum = fm['공포번호'] || '';
    const source = fm['출처'] || '';

    const badgeClass = getBadgeClass(type);

    header.innerHTML = `
        <h1>${title}</h1>
        <div class="meta-grid">
            ${type ? `<div class="meta-item"><span class="meta-badge ${badgeClass}">${type}</span></div>` : ''}
            ${status ? `<div class="meta-item"><span class="meta-badge ${status}">${status}</span></div>` : ''}
            ${dept ? `<div class="meta-item"><span class="meta-label">소관부처</span><span class="meta-value">${dept}</span></div>` : ''}
            ${promDate ? `<div class="meta-item"><span class="meta-label">공포일자</span><span class="meta-value">${promDate}</span></div>` : ''}
            ${promNum ? `<div class="meta-item"><span class="meta-label">공포번호</span><span class="meta-value">${promNum}</span></div>` : ''}
            ${effDate ? `<div class="meta-item"><span class="meta-label">시행일자</span><span class="meta-value">${effDate}</span></div>` : ''}
        </div>
        <div class="law-actions">
            <button type="button" id="bookmark-btn" class="law-action-btn" data-bookmarked="0">
                <span class="bm-icon">🔖</span>
                <span class="bm-label">즐겨찾기</span>
            </button>
            ${source ? `<a href="${source}" target="_blank" rel="noopener" class="law-action-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                국가법령정보센터
            </a>` : ''}
            <a href="${REPO_URL}/blob/main/${encodeURI(filePath)}" target="_blank" rel="noopener" class="law-action-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub에서 보기
            </a>
            <a href="${REPO_URL}/commits/main/${encodeURI(filePath)}" target="_blank" rel="noopener" class="law-action-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="1.05" y1="12" x2="7" y2="12"/><line x1="17.01" y1="12" x2="22.96" y2="12"/></svg>
                개정 이력
            </a>
        </div>
    `;
    header.style.display = 'block';

    // 북마크 버튼 바인딩
    bindBookmarkButton(filePath, title, {
        '법령구분': type,
        '소관부처': dept,
        '공포일자': promDate,
        '공포번호': promNum,
        '시행일자': effDate,
        '상태': status,
    });
}

async function bindBookmarkButton(filePath, title, payload) {
    const btn = document.getElementById('bookmark-btn');
    if (!btn) return;

    async function refresh() {
        if (!window.LawkoBookmarks) return;
        const user = window.LawkoAuth && window.LawkoAuth.getUser();
        if (!user) {
            btn.dataset.bookmarked = '0';
            btn.querySelector('.bm-icon').textContent = '🔖';
            btn.querySelector('.bm-label').textContent = '즐겨찾기';
            return;
        }
        const yes = await window.LawkoBookmarks.isBookmarked('law', filePath);
        btn.dataset.bookmarked = yes ? '1' : '0';
        btn.querySelector('.bm-icon').textContent = yes ? '✅' : '🔖';
        btn.querySelector('.bm-label').textContent = yes ? '즐겨찾기 해제' : '즐겨찾기';
        btn.style.color = yes ? 'var(--accent-light)' : '';
        btn.style.borderColor = yes ? 'var(--accent)' : '';
    }

    btn.addEventListener('click', async () => {
        try {
            const user = window.LawkoAuth && window.LawkoAuth.getUser();
            if (!user) {
                window.LawkoAuth && window.LawkoAuth.openLogin();
                return;
            }
            btn.disabled = true;
            const now = await window.LawkoBookmarks.toggle('law', filePath, title, payload);
            btn.dataset.bookmarked = now ? '1' : '0';
            btn.querySelector('.bm-icon').textContent = now ? '✅' : '🔖';
            btn.querySelector('.bm-label').textContent = now ? '즐겨찾기 해제' : '즐겨찾기';
            btn.style.color = now ? 'var(--accent-light)' : '';
            btn.style.borderColor = now ? 'var(--accent)' : '';
        } catch (e) {
            if (String(e.message || e) === 'LOGIN_REQUIRED') {
                window.LawkoAuth && window.LawkoAuth.openLogin();
            } else {
                alert('즐겨찾기 저장 실패: ' + (e.message || e));
            }
        } finally {
            btn.disabled = false;
        }
    });

    // 로그인 상태 추적해서 초기 렌더
    let lastUid = null;
    setInterval(() => {
        const u = window.LawkoAuth && window.LawkoAuth.getUser();
        const uid = u ? u.id : null;
        if (uid !== lastUid) { lastUid = uid; refresh(); }
    }, 500);
    refresh();
}

function renderRelated(filePath, metadata) {
    // Extract directory from path: kr/민법/법률.md -> kr/민법/
    const dirMatch = filePath.match(/^(kr\/[^/]+\/)/);
    if (!dirMatch) return;
    const dir = dirMatch[1];

    const related = Object.values(metadata)
        .filter(m => m.path.startsWith(dir))
        .sort((a, b) => {
            const order = { '법률': 0, '헌법': 0, '대통령령': 1, '대통령긴급명령': 1 };
            const aOrder = order[a.법령구분] ?? 2;
            const bOrder = order[b.법령구분] ?? 2;
            return aOrder - bOrder;
        });

    if (related.length <= 1) return;

    const container = document.getElementById('related-laws');
    container.innerHTML = `
        <div class="related-title">관련 법령</div>
        <div class="related-links">
            ${related.map(r => {
                const isCurrent = r.path === filePath;
                const label = r.path.endsWith('법률.md') ? '법률' :
                              r.path.endsWith('시행령.md') ? '시행령' :
                              r.path.endsWith('시행규칙.md') ? '시행규칙' :
                              r.path.endsWith('대통령령.md') ? '대통령령' :
                              r.법령구분;
                return `<a href="law.html?path=${encodeURIComponent(r.path)}" class="related-link ${isCurrent ? 'current' : ''}">${label}</a>`;
            }).join('')}
        </div>
    `;
    container.style.display = 'block';
}

function renderBody(mdBody) {
    marked.setOptions({
        breaks: false,
        gfm: true
    });
    document.getElementById('law-body').innerHTML = marked.parse(mdBody);
}

function buildTOC() {
    const body = document.getElementById('law-body');
    const headings = body.querySelectorAll('h1, h2, h3');
    if (headings.length < 3) return;

    const tocList = document.getElementById('toc-list');
    const items = [];

    headings.forEach((h, i) => {
        const id = 'section-' + i;
        h.id = id;
        const level = h.tagName.toLowerCase();
        // Only include h1 and h2 in TOC to keep it manageable
        if (level === 'h1' || level === 'h2') {
            items.push(`<li><a href="#${id}" class="toc-${level}">${h.textContent}</a></li>`);
        }
    });

    if (items.length === 0) return;
    tocList.innerHTML = items.join('');
    document.getElementById('toc-section').style.display = 'block';

    // Toggle
    const toggle = document.getElementById('toc-toggle');
    const content = document.getElementById('toc-content');
    toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        content.classList.toggle('open');
    });

    // Close TOC on link click
    tocList.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
            if (window.innerWidth < 768) {
                toggle.classList.remove('open');
                content.classList.remove('open');
            }
        });
    });
}

function showError(title, message) {
    document.getElementById('law-body').innerHTML = `
        <div class="error-state">
            <h2>${title}</h2>
            <p>${message}</p>
            <a href="browse.html">법령 검색으로 돌아가기</a>
        </div>
    `;
}

backToTop.addEventListener('click', () => {
